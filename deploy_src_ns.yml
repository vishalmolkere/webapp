apiVersion: v1
kind: Namespace
metadata:
  name: donation-app

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: donation-app
  namespace: donation-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: donation-app
  template:
    metadata:
      labels:
        app: donation-app
    spec:
      containers:
      - name: donation-app
        image: yourdockerhubusername/donation-app:v1
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: donation-app-service
  namespace: donation-app
spec:
  selector:
    app: donation-app
  ports:
  - port: 80
    targetPort: 8080
  type: LoadBalancer